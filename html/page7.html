<!DOCTYPE html>
<html lang="vi">
	<head>
		<title>Đơn giá </title>
		<meta charset ="utf-8">
		
	</head>
	<body>
		<table border ="1"> 
			<tr>
				<th>STT</th>
				<th>Tên </th>
				<th>Số lượng </th>
				<th>Đơn giá </th>
				<th>Đvt </th>
				<th>Thành tiền </th>
			</tr>
			<tr>
				<td>1</td>
				<td>Mì kokomi  </td>
				<td class= "soluong">2 </td>
				<td class= "dongia">105  </td>
				<td>Thùng </td>
				<td class= "thanhtien"> </td>
			</tr>
			<tr>
				<td>2</td>
				<td>Sữa </td>
				<td class= "soluong">40 </td>
				<td class= "dongia">200 </td>
				<td>Hộp </td>
				<td class= "thanhtien"> </td>
			</tr>
			<tr>
				<td>3</td>
				<td>Kẹo </td>
				<td class= "soluong">20 </td>
				<td class= "dongia">15 </td>
				<td>Bịch </td>
				<td class= "thanhtien"> </td>
			</tr>
			<tr>
				<td colspan ="5 "><b>Tổng thanh toán</b> </td>
				<td id= "thanhtoan"> </td>
				
			</tr>
		</table>
		<script> 
			// Truy xuất đơn giá, thành tiền, số lượng qua class 
			const sl = document.getElementsByClassName("soluong");
			const dg = document.getElementsByClassName("dongia");
			const tt = document.getElementsByClassName("thanhtien");
			
			let tongthanhtoan = 0;
			for (let i = 0; i<sl.length; i++)
			{
				let Soluong = Number(sl[i].innerHTML);
				let Dongia = Number(dg[i].innerHTML);
				let Thanhtien= Soluong * Dongia;
				tt[i].innerHTML = Thanhtien;
				tongthanhtoan += Thanhtien;
			}
			
			document.getElementById("thanhtoan").innerHTML= tongthanhtoan;
		</script>
	</body>

</html>
