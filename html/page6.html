<!DOCTYPE html>
<html lang="vi">
	<head>
		<title>Diện tích hình chữ nhật</title>
		<meta charset ="utf-8">
		
	</head>
	<body>
		<script>
			let d = Number(prompt ("Hãy nhập chiều dài hcn: "));
			let r = Number(prompt("Hãy nhập chiều rộng hcn: "));
			if (d<r)
				alert("Bạn đã nhập sai! vui lòng nhập lại chiều dài phải lớn hơn chiều rộng ");
			else if (d==r)
				alert("TRƯỜNG HỢP ĐẶC BIỆT LÀ HÌNH VUÔNG có diện tích là: " +d*r);
			else 
				alert("Diện tích hình chữ nhật là: " +d*r);
		</script>
	</body>

</html>
