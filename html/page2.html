<!DOCTYPE html>
<html lang="vi">
	<head>
		<title>Đăng nhập</title>
		<meta charset ="utf-8">
		<link rel ="stylesheet" href ="../css/style2.css">
	</head>
	<body>
		<div class="container">
			<form id="fLogin">
				<h2 id="title">Login</h2>
				<div class ="form-group">
					<label for ="txtUsername">Username: </label>
					<input class ="form-control" type="text" id="txtUsername" name="txtUsername">
				</div>
				<div class ="form-group">
					<label for ="txtPassword">Password: </label>
					<input class ="form-control" type="password" id="txtPassword" name="txtPassword">
				</div>
				<input class ="form-button" type="submit"id="sbLogin" name="sbLogin" value ="Login">
				<input class ="form-button" type="reset"id="rsCancel" name="rsCancel" value ="Cancel">
			</form>
		</div>



	</body>
</html>
