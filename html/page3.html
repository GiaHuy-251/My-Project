<!DOCTYPE html>
<html lang="vi">
	<head>
		<title>Đăng kí</title>
		<meta charset ="utf-8">
		<link rel ="stylesheet" href ="../css/style3.css">
	</head>
	<body>
		<div class="container">
			<form id="fLogin">
				<h2 id="title">Đăng kí thành viên câu lạc bộ bóng đá</h2>
				<div class ="form-group">
					<label for ="txtUsername">Tên đăng kí: </label>
					<input class ="form-control" type="text" id="txtUsername" name="txtUsername">
				</div>
				<div class ="form-group">
					<label for ="txtQuequan">Quê quán: </label>
					<input class ="form-control" type="txt" id="txtQuequan" name="txtQuequan">
				</div>
				<div class ="form-group">
					<label for ="txtNgaysinh">Ngày sinh: </label>
					<input class ="form-control" type="date" id="txtNgaysinh" name="txtNgaysinh">
				</div>
				<div class ="form-group">
					<label for ="txtPassword">Giới tính: </label>
					<select>
						<option>Nam</option>
						<option>Nữ</option>
					</select>
				</div>
				<div class ="form-group">
					<label for ="txtPassword">Vị trí sở trường: </label>
					<select>
						<option>Thủ môn</option>
						<option>Hậu vệ</option>
						<option>Tiền vệ</option>
						<option>Tiền đạo</option>
					</select>
				</div>
				<div class ="form-group">
					<label for ="txtUsername">Kinh nghiệm thi đấu: </label>
					<input class ="form-control" type="text" id="txtKn" name="txtKn">
				</div>
				<div class ="form-group">
					<label for ="sdt">Số điện thoại: </label>
					<input class ="form-control" type="tel" id="sdt" name="sdt">
				</div>
				<div class ="form-group">
					<label for ="txtUsername">Email: </label>
					<input class ="form-control" type="email" id="email" name="mail">
				</div>
				<input class ="form-button" type="submit"id="sbDk" name="sbDk" value ="ĐĂNG KÍ">
				
			</form>
		</div>



	</body>
</html>
